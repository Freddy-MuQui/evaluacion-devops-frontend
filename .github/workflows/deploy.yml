name: Deploy Frontend CI/CD

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y Subir Imagen a Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USER }}/frontend:latest

      - name: Desplegar automáticamente en EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_EC2 }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY_EC2 }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USER }}/frontend:latest
            sudo docker stop contenedor_frontend || true
            sudo docker rm contenedor_frontend || true
            sudo docker run -d -p 80:80 --name contenedor_frontend ${{ secrets.DOCKER_USER }}/frontend:latest